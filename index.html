          <div className="w-full h-10 sm:h-16 flex border-b-4 border-gray-800 bg-white relative overflow-hidden z-20 max-w-5xl mx-auto rounded-b-2xl shadow-lg">

                  <div className="absolute top-0 right-[-30%] w-[60%] h-[60%] bg-gray-800 z-10 rounded-b-sm border-x border-b border-gray-900 shadow-md"></div>

          <header className="pt-8 pb-8 px-4 text-center relative overflow-hidden z-10 bg-gradient-to-b from-[#64b5f6] via-white to-[#ff7eb3]">

            <div className="absolute top-8 right-[15%] text-4xl sm:text-5xl text-orange-400 transform rotate-12 drop-shadow-sm animate-float" style={{animationDelay: '0.5s'}}>♫</div>
            <div className="absolute top-16 right-[8%] text-3xl sm:text-4xl text-yellow-400 transform -rotate-12 drop-shadow-sm animate-float" style={{animationDelay: '1.5s'}}>♪</div>
            
            {/* SOTARO ONE MAN LIVE - スマホではみ出ないように 5.5vw に縮小 */}

              className="flex justify-center items-center font-black mb-2 text-[5.5vw] sm:text-4xl md:text-5xl tracking-normal whitespace-nowrap text-white" 
              style={{ fontFamily: 'Impact, "Arial Narrow Bold", sans-serif', textShadow: '2px 2px 0px rgba(0,0,0,0.2)' }}

            {/* ボクタチノオト - スマホではみ出ないように 13vw に縮小 */}

                fontFamily: '"Arial Black", "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif',

                WebkitTextStroke: 'clamp(2px, 0.8vw, 4px) #e60000',
                letterSpacing: '-0.02em'

              ボクタチノオト

            {/* サブタイトル - スマホではみ出ないように 4vw に縮小 */}
            <p 
              className="font-black mb-12 whitespace-nowrap text-[4vw] sm:text-2xl md:text-3xl"
              style={{
                fontFamily: '"Mochiy Pop P One", "Yusei Magic", "Hiragino Maru Gothic ProN", sans-serif',
                color: '#ffd700',
                textShadow: '1px 1px 3px rgba(0,0,0,0.2)'

              〜「ありがとう」と「みらい」へのステージ〜

            <div className="mt-8 mb-10 flex flex-col items-center gap-4">
              {/* 日付 - スマホではみ出ないように全体を 8vw、(SUN)を 5vw に縮小 */}
              <h2 
                className="text-[8vw] sm:text-7xl md:text-8xl font-black text-[#222] whitespace-nowrap leading-none"
                style={{ 
                  fontFamily: '"Arial Black", sans-serif',
                  textShadow: '-3px 3px 0 #00f0ff, 3px -3px 0 #ff1493',
                  letterSpacing: '0.02em'
                }}
              >
                2026/4/19 <span className="text-[5vw] sm:text-5xl md:text-6xl">(SUN)</span>
              </h2>
              {/* 時間 - スマホではみ出ないように 7vw に縮小 */}
              <div 
                className="text-[7vw] sm:text-5xl md:text-6xl font-black text-[#222] whitespace-nowrap leading-none mt-2"

                  fontFamily: '"Arial Black", sans-serif',
                  textShadow: '-3px 3px 0 #00f0ff, 3px -3px 0 #ff1493',
                  letterSpacing: '0.05em'
                }}

                START 14:00 -

            </div>

            <p className="text-gray-700 font-bold text-sm sm:text-lg drop-shadow-sm bg-white/70 inline-block px-6 py-3 sm:px-8 sm:py-4 rounded-3xl border border-white mt-4 leading-relaxed">
              本日はありがとうございます！！！<br/>

          </header>

                  <p className="text-2xl font-black text-yellow-600">はじまってからのおたのしみ！</p>

              </div>
            </section>

                        <img 
                          src={item.image} 
                          alt={item.title}

                    <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center rounded-2xl">
                      <span className="text-white font-bold text-sm px-2 text-center">{item.title}</span>

                  <div className="bg-white rounded-3xl p-6 shadow-md border-2 border-purple-100">
                    <div className="flex items-center gap-3 mb-4 text-purple-600 font-bold text-lg">

                    </div>
                    <p className="text-gray-600 text-sm font-medium mb-4 leading-relaxed">

                      <span className="inline-block mt-2 font-bold text-purple-700 bg-purple-50 px-3 py-1 rounded-lg">（配信チケット：別途1,100円）</span>
                    </p>
                    <a 
                      href="https://premier.twitcasting.tv/c:secondrooms/shopcart/418602" 
                      target="_blank" 
                      rel="noopener noreferrer"
                      className="w-full bg-purple-100 hover:bg-purple-200 text-purple-700 font-bold py-3 px-4 rounded-xl transition-colors flex items-center justify-center gap-2"

                  </div>

                  <div className="bg-white rounded-3xl p-6 shadow-md border-2 border-pink-100">
                    <div className="flex items-center gap-3 mb-4 text-pink-600 font-bold text-lg">
                      <Heart size={24} /> 公式SNS
                    </div>
                    <div className="space-y-3">
                      <a 
                        href="https://www.instagram.com/sotaro_uta_0223?igsh=dmV4ZjFwNDUwYmk5&utm_source=qr" 
                        target="_blank" 
                        rel="noopener noreferrer"
                        className="flex items-center justify-between p-3 rounded-xl bg-pink-50 hover:bg-pink-100 transition-colors text-pink-700 font-bold"

                        <span className="flex items-center gap-2"><Instagram size={20} /> Instagram</span>
                        <span className="text-xs">最新曲や合唱曲等をアップ中！</span>
                      </a>
                      <a 
                        href="https://youtube.com/channel/UCX6aXoQaGdm_dcCeUpt9-uw?si=vTq3qRGlSi8U5F3T" 
                        target="_blank" 
                        rel="noopener noreferrer"
                        className="flex items-center justify-between p-3 rounded-xl bg-red-50 hover:bg-red-100 transition-colors text-red-700 font-bold"
                      >
                        <span className="flex items-center gap-2"><Youtube size={20} /> YouTube</span>
                        <span className="text-xs">今後長尺動画をアップ予定🎵</span>
                      </a>
                    </div>
                  </div>
                </div>

                <div className="bg-gradient-to-br from-[#06C755] to-[#05a345] rounded-3xl p-1 shadow-[0_8px_0_#048036] transform transition-transform hover:-translate-y-1">

                    <div>
                      <div className="inline-flex items-center gap-2 bg-[#06C755] text-white font-black px-4 py-1 rounded-full text-sm mb-4">
                        <MessageCircle size={16} fill="currentColor" /> LINE公式アカウント
                      </div>
                      <h3 className="text-2xl font-black text-gray-800 mb-4 leading-snug">
                        お友だち追加で<br/>
                        <span className="text-yellow-500">湊太郎オリジナルソング</span><br/>
                        をゲットしよう！🎁
                      </h3>
                      <div className="bg-green-50 p-4 rounded-2xl mb-6">
                        <ol className="list-decimal list-inside space-y-2 text-sm font-bold text-gray-700 mb-3">
                          <li>下のボタンからLINEをお友だち追加</li>
                          <li>トーク画面で<span className="text-green-600 bg-white px-1 rounded">好きなスタンプ</span>を1つ送る！</li>
                        </ol>
                        <p className="text-sm font-bold text-pink-600 bg-pink-50 p-2 rounded-xl text-center">
                          後日、湊太郎のオリジナルソングデータをお届けします！🎧
                        </p>
                      </div>
                    </div>
                    <a 
                      href="https://lin.ee/w2lpv4C" 
                      target="_blank" 
                      rel="noopener noreferrer"
                      className="block w-full text-center bg-[#06C755] hover:bg-[#05b34c] text-white font-black py-4 px-6 rounded-2xl shadow-md transition-colors text-lg"

                      お友だち追加する！
                    </a>
                  </div>
                </div>
              </div>
            </section>

            {/* 6. アンケート */}
            <section id="survey" className="scroll-mt-24">
              <SectionTitle icon={ClipboardList} title="アンケートのおねがい" color="text-teal-500" />
              <div className="bg-white rounded-3xl p-6 sm:p-10 shadow-lg border-2 border-dashed border-teal-300 text-center">

                  <h3 className="text-xl sm:text-2xl font-black text-teal-800 mb-5 leading-snug">

                  </h3>
                  <p className="text-xs sm:text-sm font-bold text-red-600 bg-white px-4 py-3 rounded-xl inline-block shadow-sm mb-6 border border-red-100">
                    ※集合写真等のSNS掲載についても<br className="sm:hidden" />回答をお願いします
                  </p>
                  <div>
                    <a 
                      href="https://docs.google.com/forms/d/e/1FAIpQLSesczb_S3jIT6EkTfFdZ5d7iKOuhkm07Rmh5xUdX0auSC47FA/viewform?usp=header" 
                      target="_blank" 
                      rel="noopener noreferrer"
                      className="inline-block w-full sm:w-auto bg-teal-500 hover:bg-teal-600 text-white font-black py-4 px-10 rounded-full shadow-md transition-transform hover:scale-105 text-lg"

                      アンケートに答える
                    </a>
                  </div>
                </div>
              </div>
            </section>

            {/* 7. ライブハウス紹介 */}
            <section>
              <SectionTitle icon={MapPin} title="今日のステージ" color="text-red-400" />
              <div className="bg-white rounded-3xl overflow-hidden shadow-lg border-2 border-gray-100">
                <div className="bg-gray-800 p-8 text-center relative">
                  <div className="absolute inset-0 opacity-20 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-yellow-300 via-transparent to-transparent"></div>

                  <p className="text-gray-300 text-sm font-medium relative z-10">Kyoto Muko-shi</p>
                </div>
                <div className="p-6 sm:p-8">
                  <p className="text-gray-700 font-medium mb-6 text-center leading-relaxed">
                    今日、湊太郎たちが最高の音楽を届けるステージです。<br/>
                    おいしいドリンクを飲みながら、ゆっくり楽しんでね！

                  <div className="flex flex-col sm:flex-row gap-4 justify-center">
                    <a 
                      href="https://www.ilfmusic.com/secondrooms.html" 
                      target="_blank" 
                      rel="noopener noreferrer"

          </main>

          <div className="w-full h-10 sm:h-16 flex border-t-4 border-b-4 border-gray-800 bg-white relative overflow-hidden z-10 max-w-5xl mx-auto rounded-t-2xl shadow-lg mt-8">

              <div key={i} className="flex-1 border-r border-gray-300 h-full relative">
                {[1, 2, 4, 5, 6].includes(i % 7) && (
                  <div className="absolute top-0 right-[-30%] w-[60%] h-[60%] bg-gray-800 z-10 rounded-b-sm border-x border-b border-gray-900 shadow-md"></div>

          <footer className="bg-yellow-400 py-8 text-center text-yellow-900 relative z-10">
            <div className="flex justify-center mb-4">

            <p className="text-sm font-medium opacity-80">
              PRODUCE：Y＆Y
            </p>
          </footer>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
